<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المسؤول | صيدلتي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --medical-blue: #2C9A8E;
            --medical-light: #4FD1C5;
            --dark-text: #1e2a3e;
            --white: #ffffff;
            --gray-bg: #f8fafc;
        }

        * { font-family: 'Cairo', sans-serif; }
        body { background: var(--gray-bg); color: var(--dark-text); }

        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--medical-light) 0%, var(--medical-blue) 100%);
            padding: 1rem;
        }

        .login-card {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-icon {
            background: var(--medical-light);
            width: 80px;
            height: 80px;
            line-height: 80px;
            text-align: center;
            border-radius: 50%;
            margin: 0 auto 1rem;
            font-size: 2.5rem;
            color: white;
        }

        .navbar { background: var(--white); box-shadow: 0 2px 15px rgba(0,0,0,0.05); padding: 0.8rem 1rem; }
        .navbar-brand { font-weight: 800; color: var(--medical-blue); font-size: 1.6rem; }
        .card-custom { border: none; border-radius: 1.2rem; background: var(--white); box-shadow: 0 5px 15px rgba(0,0,0,0.03); transition: all 0.2s; }
        .card-custom:hover { box-shadow: 0 12px 25px rgba(0,0,0,0.08); }
        .section-title { font-weight: 800; border-right: 5px solid var(--medical-blue); padding-right: 15px; margin-bottom: 1.5rem; }
        .btn-medical { background: var(--medical-blue); color: white; border: none; transition: 0.2s; }
        .btn-medical:hover { background: #248177; color: white; }
        .btn-outline-medical { border: 1px solid var(--medical-blue); color: var(--medical-blue); }
        .btn-outline-medical:hover { background: var(--medical-blue); color: white; }
        .table-actions i { cursor: pointer; margin: 0 5px; transition: 0.2s; }
        .table-actions i:hover { transform: scale(1.1); }
        .status-badge { border-radius: 50px; padding: 4px 12px; font-size: 0.75rem; font-weight: 700; }
        .available { background: #d1e7dd; color: #0f5132; }
        .unavailable { background: #f8d7da; color: #842029; }
        footer { margin-top: 3rem; padding: 1.5rem; text-align: center; color: #718096; border-top: 1px solid #edf2f7; }
    </style>
</head>
<body>

<div id="loginSection" class="login-wrapper">
    <div class="login-card">
        <div class="login-icon"><i class="fas fa-user-shield"></i></div>
        <h3 class="fw-bold mb-2">مرحباً بعودتك</h3>
        <p class="text-muted mb-4">سجل الدخول للوصول إلى لوحة التحكم</p>
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="mb-3">
                <label class="form-label fw-bold text-start d-block">ايميل المستخدم</label>
                <input type="text" id="username" class="form-control form-control-lg rounded-pill" placeholder="gmail..." required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold text-start d-block">كلمة المرور</label>
                <input type="password" id="password" class="form-control form-control-lg rounded-pill" placeholder="********" required>
            </div>
            <button type="submit" class="btn btn-medical w-100 py-2 rounded-pill fw-bold">تسجيل الدخول</button>
        </form>
        <div id="loginError" class="mt-3 text-danger small" style="display: none;">اسم المستخدم أو كلمة المرور غير صحيحة</div>
    </div>
</div>

<div id="adminContent" style="display: none;">
    <nav class="navbar sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-user-shield"></i> لوحة المسؤول | صيدلتي</a>
            <div>
                <button class="btn btn-outline-danger btn-sm rounded-pill" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <ul class="nav nav-tabs mb-4" id="adminTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="pharmacies-tab" data-bs-toggle="tab" data-bs-target="#pharmacies" type="button">الصيدليات</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="drugs-tab" data-bs-toggle="tab" data-bs-target="#drugs" type="button">الأدوية</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="import-tab" data-bs-toggle="tab" data-bs-target="#import-section" type="button">استيراد وبحث</button>
            </li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="pharmacies">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3 class="section-title mb-0">قائمة الصيدليات</h3>
                    <button class="btn btn-medical rounded-pill" data-bs-toggle="modal" data-bs-target="#addPharmacyModal"><i class="fas fa-plus"></i> إضافة صيدلية</button>
                </div>
                <div class="card-custom p-3">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead><tr><th>#</th><th>اسم الصيدلية</th><th>الموقع</th><th>الهاتف</th><th>الإجراءات</th></tr></thead>
                            <tbody id="pharmaciesTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="drugs">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3 class="section-title mb-0">قائمة الأدوية</h3>
                    <button class="btn btn-medical rounded-pill" data-bs-toggle="modal" data-bs-target="#addDrugModal"><i class="fas fa-plus"></i> إضافة دواء</button>
                </div>
                <div class="card-custom p-3">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead><tr><th>#</th><th>اسم الدواء</th><th>الصيدلية</th><th>السعر</th><th>الحالة</th><th>الإجراءات</th></tr></thead>
                            <tbody id="drugsTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="import-section">
                <div class="card-custom p-4 mb-4">
                    <h5 class="fw-bold mb-3">أدوات الاستيراد السريع</h5>
                    <input type="file" id="fileInput" style="display: none;" />
                    <button class="btn btn-outline-medical rounded-pill me-2" onclick="importFromFile('pharmacy')"><i class="fas fa-upload"></i> استيراد صيدليات</button>
                    <button class="btn btn-outline-medical rounded-pill" onclick="importFromFile('drug')"><i class="fas fa-file-import"></i> استيراد أدوية</button>
                </div>
                <div class="text-center mb-5">
                    <h2 class="fw-bold mb-4">معاينة البحث</h2>
                    <div class="input-group input-group-lg mx-auto" style="max-width: 600px;">
                        <input type="text" id="searchInput" class="form-control border-0 shadow-sm" placeholder="اسم الدواء...">
                        <button class="btn btn-medical" onclick="handleSearch()"><i class="fas fa-search"></i></button>
                    </div>
                </div>
                <div id="resultsGrid" class="row g-4 mb-5"></div>
                <h3 class="section-title">معاينة الصيدليات</h3>
                <div id="pharmaciesList" class="row g-4"></div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="addPharmacyModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title" id="pharmacyModalTitle">إضافة صيدلية</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="pharmacyForm">
                    <input type="hidden" id="pharmacyId">
                    <div class="mb-3"><label class="form-label fw-bold">الاسم</label><input type="text" id="pharmacyName" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label fw-bold">الموقع</label><input type="text" id="pharmacyLocation" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label fw-bold">الهاتف</label><input type="tel" id="pharmacyPhone" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label fw-bold">الأيقونة</label><input type="text" id="pharmacyIcon" class="form-control" value="fa-hospital"></div>
                </form>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button><button type="button" class="btn btn-medical" onclick="savePharmacy()">حفظ</button></div>
        </div>
    </div>
</div>

<div class="modal fade" id="addDrugModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title" id="drugModalTitle">إضافة دواء</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="drugForm">
                    <input type="hidden" id="drugId">
                    <div class="mb-3"><label class="form-label fw-bold">الاسم</label><input type="text" id="drugName" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label fw-bold">الصيدلية</label><select id="drugPharmacy" class="form-select" required></select></div>
                    <div class="mb-3"><label class="form-label fw-bold">السعر</label><input type="number" id="drugPrice" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label fw-bold">الحالة</label><select id="drugStatus" class="form-select"><option value="available">متوفر</option><option value="unavailable">غير متوفر</option></select></div>
                </form>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button><button type="button" class="btn btn-medical" onclick="saveDrug()">حفظ</button></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const ADMIN_USERNAME = "Mazin Hassan";
    const ADMIN_PASSWORD = "panda@2025";
    
    let pharmacies = JSON.parse(localStorage.getItem('pharmacies')) || [
        { id: 1, name: "صيدلية النور", location: "الرياض", phone: "0912345678", icon: "fa-hospital" }
    ];
    let drugs = JSON.parse(localStorage.getItem('drugs')) || [
        { id: 1, name: "بانادول", pharmacyId: 1, price: "1200", status: "available" }
    ];

    function saveToLocal() {
        localStorage.setItem('pharmacies', JSON.stringify(pharmacies));
        localStorage.setItem('drugs', JSON.stringify(drugs));
    }

    function handleLogin(event) {
        event.preventDefault();
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value;
        if (u === ADMIN_USERNAME && p === ADMIN_PASSWORD) {
            sessionStorage.setItem('admin_logged_in', 'true');
            showAdminPanel();
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }

    function logout() { sessionStorage.removeItem('admin_logged_in'); location.reload(); }

    function showAdminPanel() {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('adminContent').style.display = 'block';
        refreshUI();
    }

    function refreshUI() {
        renderPharmaciesTable();
        renderDrugsTable();
        renderPharmaciesGrid();
        updatePharmacySelect();
    }

    function renderPharmaciesTable() {
        const tbody = document.getElementById('pharmaciesTableBody');
        tbody.innerHTML = pharmacies.map((ph, i) => `
            <tr>
                <td>${i+1}</td>
                <td><i class="fas ${ph.icon} text-primary"></i> ${ph.name}</td>
                <td>${ph.location}</td>
                <td>${ph.phone}</td>
                <td class="table-actions">
                    <i class="fas fa-edit text-primary" onclick="editPharmacy(${ph.id})"></i>
                    <i class="fas fa-trash-alt text-danger" onclick="deletePharmacy(${ph.id})"></i>
                </td>
            </tr>
        `).join('');
    }

    function renderDrugsTable() {
        const tbody = document.getElementById('drugsTableBody');
        tbody.innerHTML = drugs.map((d, i) => {
            const ph = pharmacies.find(p => p.id === d.pharmacyId);
            return `
                <tr>
                    <td>${i+1}</td>
                    <td>${d.name}</td>
                    <td>${ph ? ph.name : 'غير معروف'}</td>
                    <td>${d.price}</td>
                    <td><span class="badge ${d.status==='available'?'bg-success':'bg-danger'}">${d.status==='available'?'متوفر':'غير متوفر'}</span></td>
                    <td class="table-actions">
                        <i class="fas fa-edit text-primary" onclick="editDrug(${d.id})"></i>
                        <i class="fas fa-trash-alt text-danger" onclick="deleteDrug(${d.id})"></i>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function renderPharmaciesGrid() {
        const list = document.getElementById('pharmaciesList');
        list.innerHTML = pharmacies.map(p => `
            <div class="col-md-3">
                <div class="card card-custom p-3 text-center">
                    <i class="fas ${p.icon} fa-2x text-primary mb-2"></i>
                    <h6 class="fw-bold">${p.name}</h6>
                    <a href="tel:${p.phone}" class="btn btn-sm btn-outline-primary rounded-pill w-100">اتصال</a>
                </div>
            </div>
        `).join('');
    }

    function updatePharmacySelect() {
        const select = document.getElementById('drugPharmacy');
        select.innerHTML = pharmacies.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    }

    function savePharmacy() {
        const id = document.getElementById('pharmacyId').value;
        const name = document.getElementById('pharmacyName').value;
        const loc = document.getElementById('pharmacyLocation').value;
        const phone = document.getElementById('pharmacyPhone').value;
        const icon = document.getElementById('pharmacyIcon').value;

        if(id) {
            const i = pharmacies.findIndex(p => p.id == id);
            pharmacies[i] = {id: parseInt(id), name, location: loc, phone, icon};
        } else {
            const newId = pharmacies.length > 0 ? Math.max(...pharmacies.map(p => p.id)) + 1 : 1;
            pharmacies.push({id: newId, name, location: loc, phone, icon});
        }
        saveToLocal(); refreshUI(); bootstrap.Modal.getInstance(document.getElementById('addPharmacyModal')).hide();
    }

    function editPharmacy(id) {
        const ph = pharmacies.find(p => p.id === id);
        document.getElementById('pharmacyId').value = ph.id;
        document.getElementById('pharmacyName').value = ph.name;
        document.getElementById('pharmacyLocation').value = ph.location;
        document.getElementById('pharmacyPhone').value = ph.phone;
        document.getElementById('pharmacyIcon').value = ph.icon;
        new bootstrap.Modal(document.getElementById('addPharmacyModal')).show();
    }

    function deletePharmacy(id) {
        if(confirm('سيتم حذف الصيدلية وأدويتها!')) {
            pharmacies = pharmacies.filter(p => p.id !== id);
            drugs = drugs.filter(d => d.pharmacyId !== id);
            saveToLocal(); refreshUI();
        }
    }

    function saveDrug() {
        const id = document.getElementById('drugId').value;
        const name = document.getElementById('drugName').value;
        const phId = parseInt(document.getElementById('drugPharmacy').value);
        const price = document.getElementById('drugPrice').value;
        const status = document.getElementById('drugStatus').value;

        if(id) {
            const i = drugs.findIndex(d => d.id == id);
            drugs[i] = {id: parseInt(id), name, pharmacyId: phId, price, status};
        } else {
            const newId = drugs.length > 0 ? Math.max(...drugs.map(d => d.id)) + 1 : 1;
            drugs.push({id: newId, name, pharmacyId: phId, price, status});
        }
        saveToLocal(); refreshUI(); bootstrap.Modal.getInstance(document.getElementById('addDrugModal')).hide();
    }

    function editDrug(id) {
        const d = drugs.find(x => x.id === id);
        document.getElementById('drugId').value = d.id;
        document.getElementById('drugName').value = d.name;
        document.getElementById('drugPharmacy').value = d.pharmacyId;
        document.getElementById('drugPrice').value = d.price;
        document.getElementById('drugStatus').value = d.status;
        new bootstrap.Modal(document.getElementById('addDrugModal')).show();
    }

    function deleteDrug(id) {
        if(confirm('حذف الدواء؟')) { drugs = drugs.filter(x => x.id !== id); saveToLocal(); refreshUI(); }
    }

    function handleSearch() {
        const q = document.getElementById('searchInput').value.trim();
        const grid = document.getElementById('resultsGrid');
        const results = drugs.filter(d => d.name.includes(q));
        grid.innerHTML = results.map(r => {
            const ph = pharmacies.find(p => p.id === r.pharmacyId);
            return `
                <div class="col-md-6">
                    <div class="card card-custom p-3">
                        <h5 class="fw-bold text-primary">${r.name}</h5>
                        <p class="small mb-1 text-muted">${ph ? ph.name : ''}</p>
                        <p class="fw-bold text-success">${r.price} ج.س</p>
                    </div>
                </div>
            `;
        }).join('');
    }

    function importFromFile(type) {
        const fileInput = document.getElementById('fileInput');
        fileInput.accept = '.json';
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = JSON.parse(event.target.result);
                type === 'pharmacy' ? processPharmacies(data) : processDrugs(data);
                fileInput.value = '';
            };
            reader.readAsText(file);
        };
        fileInput.click();
    }

    function processPharmacies(list) {
        list.forEach(item => {
            const idx = pharmacies.findIndex(p => p.name === item.name);
            if(idx > -1) pharmacies[idx] = {...pharmacies[idx], ...item};
            else pharmacies.push({id: Date.now() + Math.random(), icon: 'fa-hospital', ...item});
        });
        saveToLocal(); refreshUI(); alert('تم الاستيراد');
    }

    function processDrugs(list) {
        list.forEach(item => {
            const ph = pharmacies.find(p => p.name === item.pharmacyName);
            if(ph) {
                const idx = drugs.findIndex(d => d.name === item.name && d.pharmacyId === ph.id);
                if(idx > -1) drugs[idx].price = item.price;
                else drugs.push({id: Date.now() + Math.random(), name: item.name, pharmacyId: ph.id, price: item.price, status: 'available'});
            }
        });
        saveToLocal(); refreshUI(); alert('تم الاستيراد');
    }

    window.onload = () => { if(sessionStorage.getItem('admin_logged_in') === 'true') showAdminPanel(); };
</script>
</body>
</html>
